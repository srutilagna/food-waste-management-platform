<h2>Add Food</h2>

<form method="POST">
  <input name="food" placeholder="Food Name" required><br><br>
  <input name="quantity" placeholder="Quantity" required><br><br>
  <input name="location" placeholder="Location" required><br><br>
  <input name="expiry" type="datetime-local" required><br><br>

  <button type="submit">Add Food</button>
</form>
